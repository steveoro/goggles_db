version: 2.1
orbs:
  ruby: circleci/ruby@2.6.0

common-config: &common-config
  resource_class: large
  working_directory: ~/goggles_db
  shell: /bin/bash --login
  # [20251012] NOTE: not using CodeClimate anymore because now it's not open/free anymore
  #            (CodeClimate has changed into an Enterprise solution only)
  docker:
    - image: cimg/ruby:3.4.7-node
      environment:
        RAILS_ENV: test
        DISABLE_SPRING: true
        BUNDLE_JOBS: 2
        BUNDLE_RETRY: 2
        BUNDLE_PATH: vendor/bundle
        PAGER: cat
    # NOTE: before version 11.4.2, each updated test DB dump needed to be
    # edited to remove the sandbox mode parameter (which wasn't recognized by the DB container)
    #
    # To remove the sandbox parameter (usually at line 7) from the dump file:
    # 1. unzip the test DB dump & open bash in the same folder
    # 2. "head -n 6 test.sql > t1.sql"
    # 3. "tail -n +8 test.sql > t2.sql"
    # 4. "cat t?.sql > test.sql"
    # 5. To verify the removal: "head -n 10 test.sql"
    # 6. Remove the old dump file: "rm test.sql.bz2"
    # 7. Remove the old dump file parts: "rm t?.sql"
    # 8. Create a new dump file: "bzip2 test.sql"
    - image: cimg/mariadb:11.8.6
      environment:
        DATABASE_NAME: goggles_test
        DATABASE_USER: root
        PAGER: cat

common-db-setup: &common-db-setup
  name: DB setup
  command: |
    sudo apt update
    sudo apt-get install mariadb-client
    mkdir -p tmp ~/test-results ~/test-artifacts
    mv spec/dummy/config/database_ci.yml spec/dummy/config/database.yml
    dockerize -wait tcp://localhost:3306 -timeout 2m
    RAILS_ENV=test bin/rails app:db:rebuild from=test to=test
    RAILS_ENV=test bin/rails db:migrate

jobs:
  rubocop:
    <<: *common-config
    # parallelism: 1 (no actual need here)
    steps:
      - checkout
      - ruby/install-deps:
          app-dir: ~/goggles_db
          key: goggles_db-v0900
      - ruby/rubocop-check:
          app-dir: ~/goggles_db
          label: Rubocop

  brakeman:
    <<: *common-config
    # parallelism: 1 (no actual need here)
    steps:
      - checkout
      - ruby/install-deps:
          app-dir: ~/goggles_db
          key: goggles_db-v0900
      - run:
          name: Brakeman
          command: |
            bundle exec brakeman -A6q -p spec/dummy

  zeitwerk:
    <<: *common-config
    # parallelism: 1 (no actual need here)
    steps:
      - checkout
      - attach_workspace:
          at: ~/goggles_db/tmp
      - ruby/install-deps:
          app-dir: ~/goggles_db
          key: goggles_db-v0900
      - run:
          <<: *common-db-setup
      - run:
          name: Zeitwerk check
          command: |
            bundle exec rake app:zeitwerk:check

  rspec-model:
    <<: *common-config
    parallelism: 3
    steps:
      - checkout
      - attach_workspace:
          at: ~/goggles_db/tmp
      - ruby/install-deps:
          app-dir: ~/goggles_db
          key: goggles_db-v0900
      - run:
          <<: *common-db-setup
      - run:
          name: RSpec - models
          command: |
            TEST_FILES=$(circleci tests glob "spec/models/**/*_spec.rb")
            echo "$TEST_FILES" | circleci tests run --command="xargs bundle exec spec/dummy/bin/rspec --color --order rand -f doc \
                        --format RspecJunitFormatter -o ~/test-results/rspec-models.xml" --verbose --split-by=timings
      - store_test_results:
          path: ~/test-results
      - store_artifacts:
          path: ~/test-artifacts

  rspec-command:
    <<: *common-config
    parallelism: 2
    steps:
      - checkout
      - attach_workspace:
          at: ~/goggles_db/tmp
      - ruby/install-deps:
          app-dir: ~/goggles_db
          key: goggles_db-v0900
      - run:
          <<: *common-db-setup
      - run:
          name: RSpec - commands
          command: |
            TEST_FILES=$(circleci tests glob "spec/commands/**/*_spec.rb")
            echo "$TEST_FILES" | circleci tests run --command="xargs bundle exec spec/dummy/bin/rspec --color --order rand -f doc \
                        --format RspecJunitFormatter -o ~/test-results/rspec-commands.xml" --verbose --split-by=timings
      - store_test_results:
          path: ~/test-results
      - store_artifacts:
          path: ~/test-artifacts

  rspec-decorator:
    <<: *common-config
    parallelism: 2
    steps:
      - checkout
      - attach_workspace:
          at: ~/goggles_db/tmp
      - ruby/install-deps:
          app-dir: ~/goggles_db
          key: goggles_db-v0900
      - run:
          <<: *common-db-setup
      - run:
          name: RSpec - decorators
          command: |
            TEST_FILES=$(circleci tests glob "spec/decorators/**/*_spec.rb")
            echo "$TEST_FILES" | circleci tests run --command="xargs bundle exec spec/dummy/bin/rspec --color --order rand -f doc \
                        --format RspecJunitFormatter -o ~/test-results/rspec-decorators.xml" --verbose --split-by=timings
      - store_test_results:
          path: ~/test-results
      - store_artifacts:
          path: ~/test-artifacts

  rspec-strategy:
    <<: *common-config
    parallelism: 3
    steps:
      - checkout
      - attach_workspace:
          at: ~/goggles_db/tmp
      - ruby/install-deps:
          app-dir: ~/goggles_db
          key: goggles_db-v0900
      - run:
          <<: *common-db-setup
      - run:
          name: RSpec - strategies
          command: |
            TEST_FILES=$(circleci tests glob "spec/strategies/**/*_spec.rb")
            echo "$TEST_FILES" | circleci tests run --command="xargs bundle exec spec/dummy/bin/rspec --color --order rand -f doc \
                        --format RspecJunitFormatter -o ~/test-results/rspec-strategies.xml" --verbose --split-by=timings
      - store_test_results:
          path: ~/test-results
      - store_artifacts:
          path: ~/test-artifacts

  rspec-validator:
    <<: *common-config
    # parallelism: 1 (no actual need here)
    steps:
      - checkout
      - attach_workspace:
          at: ~/goggles_db/tmp
      - ruby/install-deps:
          app-dir: ~/goggles_db
          key: goggles_db-v0900
      - run:
          <<: *common-db-setup
      - run:
          name: RSpec - validators
          command: |
            TEST_FILES=$(circleci tests glob "spec/validators/**/*_spec.rb")
            echo "$TEST_FILES" | circleci tests run --command="xargs bundle exec spec/dummy/bin/rspec --color --order rand -f doc \
                        --format RspecJunitFormatter -o ~/test-results/rspec-validators.xml" --verbose --split-by=timings
      - store_test_results:
          path: ~/test-results
      - store_artifacts:
          path: ~/test-artifacts

workflows:
  full-build:
    jobs:
      - brakeman
      - rubocop
      - zeitwerk

      - rspec-model:
          requires:
            - brakeman
            - rubocop
            - zeitwerk

      - rspec-command:
          requires:
            - rspec-model
      - rspec-decorator:
          requires:
            - rspec-model
      - rspec-validator:
          requires:
            - rspec-model

      - rspec-strategy:
          requires:
            - rspec-command
            - rspec-decorator
